name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9A-Za-z]*'
      - '!v*\+*'
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: mcp-repl-x86_64-unknown-linux-gnu.tar.gz
            artifact_name: release-x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
            asset_name: mcp-repl-aarch64-apple-darwin.tar.gz
            artifact_name: release-aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            asset_name: mcp-repl-x86_64-pc-windows-msvc.zip
            artifact_name: release-x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          rustflags: ""
          cache-bin: false

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Validate release tag matches Cargo version
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "release tag must be semver like v0.1.0 or v0.1.0-rc1" >&2
            exit 1
          fi
          release_version="${RELEASE_TAG#v}"
          cargo_version="$(cargo metadata --no-deps --format-version 1 | python -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "${cargo_version}" != "${release_version}" ]; then
            echo "release tag ${RELEASE_TAG} does not match Cargo version ${cargo_version}" >&2
            exit 1
          fi

      - name: cargo check
        run: cargo check

      - name: cargo build
        run: cargo build

      - name: Python public API suite
        if: matrix.os != 'windows-2022'
        run: python3 tests/run_integration_tests.py --binary target/debug/mcp-repl

      - name: Python public API suite (windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: python tests/run_integration_tests.py --binary target/debug/mcp-repl.exe

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install Codex CLI
        if: matrix.os != 'windows-2022'
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @openai/codex
          npm_bin="$(npm config get prefix)/bin"
          echo "$npm_bin" >> "$GITHUB_PATH"
          export PATH="$npm_bin:$PATH"
          codex --version

      - name: Install Codex CLI (windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          npm install -g @openai/codex
          $npmPrefix = npm config get prefix
          Add-Content -Path $env:GITHUB_PATH -Value $npmPrefix
          $env:PATH = "$npmPrefix;$env:PATH"
          & (Join-Path $npmPrefix "codex.cmd") --version

      - name: cargo test
        env:
          MCP_REPL_CODEX_BACKEND: mock
        run: cargo test --quiet -- --test-threads=5

      - name: cargo +nightly fmt
        run: cargo +nightly fmt --all -- --check

      - name: cargo build --release
        run: cargo build --release --locked

      - name: Smoke test release binary
        if: matrix.os != 'windows-2022'
        run: ./target/release/mcp-repl --help

      - name: Smoke test release binary (windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          .\target\release\mcp-repl.exe --help

      - name: Package release archive
        if: (github.event_name == 'pull_request' || github.ref_type == 'tag') && matrix.os != 'windows-2022'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/mcp-repl-${{ matrix.target }}"
          mkdir -p "$package_dir"
          cp target/release/mcp-repl "$package_dir/mcp-repl"
          cp README.md LICENSE "$package_dir/"
          tar -C dist -czf "dist/${{ matrix.asset_name }}" "mcp-repl-${{ matrix.target }}"

      - name: Package release archive (windows)
        if: (github.event_name == 'pull_request' || github.ref_type == 'tag') && matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $packageDir = "dist/mcp-repl-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "target/release/mcp-repl.exe" "$packageDir/mcp-repl.exe"
          Copy-Item "README.md" "$packageDir/README.md"
          Copy-Item "LICENSE" "$packageDir/LICENSE"
          Push-Location "dist"
          Compress-Archive -Path "mcp-repl-${{ matrix.target }}" -DestinationPath "${{ matrix.asset_name }}" -Force
          Pop-Location

      - name: Build PyPI wheel
        if: github.event_name == 'pull_request' || github.ref_type == 'tag'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.11.5
          command: build
          args: --release --locked --compatibility pypi --out dist/wheels
          container: off

      - name: Smoke test PyPI wheel
        if: (github.event_name == 'pull_request' || github.ref_type == 'tag') && matrix.os != 'windows-2022'
        shell: bash
        run: |
          set -euo pipefail
          wheel_path="$(find dist/wheels -maxdepth 1 -type f -name 'posit_mcp_repl-*.whl' -print -quit)"
          test -n "$wheel_path"
          python3 -m venv wheel-smoke
          ./wheel-smoke/bin/python -m pip install --disable-pip-version-check "$wheel_path"
          ./wheel-smoke/bin/mcp-repl --help

      - name: Smoke test PyPI wheel (windows)
        if: (github.event_name == 'pull_request' || github.ref_type == 'tag') && matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path "dist/wheels" -Filter "posit_mcp_repl-*.whl" | Select-Object -First 1
          if ($null -eq $wheel) {
            throw "missing posit_mcp_repl wheel"
          }
          python -m venv wheel-smoke
          .\wheel-smoke\Scripts\python.exe -m pip install --disable-pip-version-check $wheel.FullName
          .\wheel-smoke\Scripts\mcp-repl.exe --help

      - name: Upload packaged artifact
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Upload PyPI wheel artifact
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.target }}
          path: dist/wheels/*.whl
          if-no-files-found: error

  publish-release:
    name: publish-release
    if: github.event_name == 'push' && github.ref_type == 'tag' && needs.checks.result == 'success'
    needs: checks
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RELEASE_TAG}" =~ ^v[0-9]+(\.[0-9]+){2}$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "latest=true" >> "$GITHUB_OUTPUT"
          elif [[ "${RELEASE_TAG}" =~ ^v[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "release tag must be final semver like v0.1.0 or prerelease semver like v0.1.0-rc1" >&2
            exit 1
          fi
          git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Verify packaged asset set
        shell: bash
        run: |
          set -euo pipefail
          expected_assets=(
            mcp-repl-x86_64-unknown-linux-gnu.tar.gz
            mcp-repl-aarch64-apple-darwin.tar.gz
            mcp-repl-x86_64-pc-windows-msvc.zip
          )
          for asset in "${expected_assets[@]}"; do
            test -f "dist/$asset"
          done
          actual_count="$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')"
          test "$actual_count" = "3"

      - name: Write SHA256SUMS.txt
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum \
              mcp-repl-x86_64-unknown-linux-gnu.tar.gz \
              mcp-repl-aarch64-apple-darwin.tar.gz \
              mcp-repl-x86_64-pc-windows-msvc.zip \
              > SHA256SUMS.txt
          )

      - name: Create or update tag release
        shell: bash
        run: |
          set -euo pipefail
          prerelease_flag="${{ steps.release_tag.outputs.prerelease }}"
          latest_flag="${{ steps.release_tag.outputs.latest }}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq .id)"
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F tag_name="${RELEASE_TAG}" \
              -F name="${RELEASE_TAG}" \
              -F draft=false \
              -F prerelease="${prerelease_flag}" \
              -f make_latest="${latest_flag}" \
              >/dev/null
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            latest_args=("--latest=false")
            prerelease_args=()
            if [ "${latest_flag}" = "true" ]; then
              latest_args=("--latest")
            fi
            if [ "${prerelease_flag}" = "true" ]; then
              prerelease_args=("--prerelease")
            fi
            gh release create "${RELEASE_TAG}" dist/* --title "${RELEASE_TAG}" --generate-notes "${prerelease_args[@]}" "${latest_args[@]}"
          fi

  publish-pypi:
    name: publish-pypi
    if: github.event_name == 'push' && github.ref_type == 'tag' && needs.checks.result == 'success'
    needs: checks
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/posit-mcp-repl

    steps:
      - name: Download PyPI wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pypi-wheel-*
          merge-multiple: true
          path: dist

      - name: Verify PyPI wheel set
        shell: bash
        run: |
          set -euo pipefail
          wheel_count="$(find dist -maxdepth 1 -type f -name 'posit_mcp_repl-*.whl' | wc -l | tr -d ' ')"
          test "$wheel_count" = "3"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
